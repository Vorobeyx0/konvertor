<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Конвертор</title>
    <style>
        body {
            background: radial-gradient(circle, rgb(60, 73, 190), rgb(24, 34, 107));
            font-family: Arial, sans-serif;
            margin-left: 60px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 90% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 10%);
            pointer-events: none;
            animation: moveBg 12s infinite alternate;
            z-index: -1;
        }
        @keyframes moveBg {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(10%,5%) scale(1.3); opacity: 0.8; }
        }
        .card { animation: fadeSlideUp 0.5s ease forwards; opacity: 0; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }
        .card:nth-child(4) { animation-delay: 0.7s; }
        h1 {
            text-align: center;
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        h2 {
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input {
            text-align: center;
            border-radius: 10px;
            border: none;
            outline: none;
        }
        .row { margin: 20px 0; }
        label {
            color: white;
            font-size: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .container { margin: 20px 0; }
        .column {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            justify-content: center;
        }
        .emod {
            color: white;
            font-size: 65px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input:hover {
            transform: scale(1.02);
            transition: transform 0.2s ease;
        }
        .si-field {
    border: 3px solid gold;
    box-shadow: 0 0 6px gold;
    background: rgba(255, 255, 255, 0.95);
    font-weight: bold;
}
    </style>
</head>
<body>

    <h1>Перевод физических величин</h1>
    <div style="text-align: center; margin: 20px 0;">
    <button onclick="clearAll()" style="background: #ff7e5e; color: white; font-size: 24px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;">
        🧹 Очистить все поля
    </button>
</div>

    <div style="display: flex; gap: 25px; flex-wrap: wrap; justify-content: center;">
   
        <!-- Скорость -->
        <div class="column card">
            <div>
                <h2><span class="emod">🏃‍♂️‍➡️</span>Скорость</h2>
                <div class="row"><label>м/с</label><input id="ms" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>км/ч</label><input id="kmh" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Время -->
        <div class="column card">
            <div>
                <h2><span class="emod">⏱️</span>Время</h2>
                <div class="container"><label>Сек </label><input id="sec" type="text" class="si-field" style="width:300px; height:60px; font-size:28pxp;"></div>
                <div class="container"><label>Мин</label><input id="min" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="container"><label>Час</label><input id="hour" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Температура -->
        <div class="column card">
            <div>
                <h2><span class="emod">🌡️</span>Температура</h2>
                <div class="row"><label>K</label><input id="kelvin" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°C</label><input id="celsius" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°F</label><input id="fahrenheit" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Плотность -->
        <div class="column card">
            <div>
                <h2><span class="emod">⚖️</span>Плотность</h2>
                <div class="row"><label>кг/м³</label><input id="kgm" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>г/см³</label><input id="gcm" type="text" style="width:300px; height:60px; font-size:28px"></div>
                 
            </div>
        </div>
    </div>
    
    <div style="margin-top: 50px; width: 100%;">
        <h2 style="text-align: center; color: white; font-size: 64px;">📏 Длина</h2>
        <div style="display: flex; flex-wrap: wrap; gap: 36px; justify-content: center; align-items: flex-end;" id="meter-scale"></div>
    </div>

    

    <!-- ШКАЛА ДЛИНЫ -->
    <script>
        (function() {
            const units = [
                { name: "микро", sym: "мкм", factor: 1000000 },
                { name: "милли", sym: "мм", factor: 10000 },
                { name: "санти", sym: "см", factor: 100},
                { name: "деци", sym: "дм", factor: 10 },
                { name: "метр", sym: "м", factor: 1 },
                { name: "дека", sym: "да", factor: 0.1 },
                { name: "гекто", sym: "г", factor: 0.001 },
                { name: "кило", sym: "км", factor: 0.0001 },
                { name: "мега", sym: "М", factor:  0.00001 },
                { name: "гига", sym: "Г", factor: 0.000001 },
                { name: "тера", sym: "Т", factor: 0.0000001  }
            ];

            const container = document.getElementById("meter-scale");
            if (!container) return;
            const inputs = {};

            units.forEach(unit => {
                const div = document.createElement("div");
                div.style.textAlign = "center";
                div.style.minWidth = "80px";

                const input = document.createElement("input");
                input.type = "number";
                input.placeholder = "0";
                input.style.width = "110px";
                input.style.padding = "10px";
                input.style.fontSize = "28px";
                input.style.textAlign = "center";
                input.style.borderRadius = "12px";
                input.style.background = "rgba(255,255,255,0.9)";

                if (unit.sym === "м") {
                    input.style.border = "3px solid gold";
                    input.style.boxShadow = "0 0 6px gold";
                    input.style.fontWeight = "bold";
                } else {
                    input.style.border = "1px solid rgba(255,255,255,0.3)";
                }

                const label = document.createElement("label");
                label.textContent = `${unit.name} (${unit.sym})`;
                label.style.display = "block";
                label.style.fontSize = "24px";
                label.style.marginTop = "5px";
                label.style.color = "white";

                div.appendChild(input);
                div.appendChild(label);
                container.appendChild(div);
                inputs[unit.sym] = { input, factor: unit.factor };
            });

            function updateAll(sourceSym, sourceValue) {
                const sourceFactor = inputs[sourceSym].factor;
                const meters = sourceValue / sourceFactor;
                for (let sym in inputs) {
                    if (sym !== sourceSym) {
                        const target = inputs[sym];
                        let value = meters * target.factor;
                        target.input.value = parseFloat(value.toFixed(6));
                    }
                }
            }

            for (let sym in inputs) {
                const inp = inputs[sym].input;
                inp.addEventListener("input", (e) => {
                    let val = parseFloat(e.target.value);
                    if (isNaN(val)) return;
                    updateAll(sym, val);
                });
            }
        })();
    </script>

    <!-- ОСНОВНЫЕ КОНВЕРТЕРЫ С ОКРУГЛЕНИЕМ -->
    <script>
        let a = document.getElementById("kmh");
        let b = document.getElementById("ms");
        let c = document.getElementById("sec");
        let d = document.getElementById("hour");
        let e = document.getElementById("min");
        let celsius = document.getElementById("celsius");
        let fahrenheit = document.getElementById("fahrenheit");
        let kelvin = document.getElementById("kelvin");
        let kgm = document.getElementById("kgm");
        let gcm = document.getElementById("gcm");

        function roundValue(val) {
            return parseFloat(Number(val).toFixed(6));
        }

        // Скорость
        a.oninput = () => b.value = roundValue(a.value / 3.6);
        b.oninput = () => a.value = roundValue(b.value * 3.6);

        // Время
        c.oninput = () => {
            d.value = roundValue(c.value / 3600);
            e.value = roundValue(c.value / 60);
        };
        d.oninput = () => {
            c.value = roundValue(d.value * 3600);
            e.value = roundValue(d.value * 60);
        };
        e.oninput = () => {
            c.value = roundValue(e.value * 60);
            d.value = roundValue(e.value / 60);
        };

        // Температура
        celsius.oninput = () => {
            fahrenheit.value = roundValue((celsius.value * 9/5 + 32));
            kelvin.value = roundValue(parseFloat(celsius.value) + 273.15);
        };
        fahrenheit.oninput = () => {
            celsius.value = roundValue((fahrenheit.value - 32) * 5/9);
            kelvin.value = roundValue((fahrenheit.value - 32) * 5/9 + 273.15);
        };
        kelvin.oninput = () => {
            celsius.value = roundValue(kelvin.value - 273.15);
            fahrenheit.value = roundValue((kelvin.value - 273.15) * 9/5 + 32);
        };

        // Плотность
        kgm.oninput = () => gcm.value = roundValue(kgm.value / 1000);
        gcm.oninput = () => kgm.value = roundValue(gcm.value * 1000);

        function clearAll() {
    // Все поля скорости, времени, температуры, плотности
    let fields = ["kmh", "ms", "sec", "min", "hour", "celsius", "fahrenheit", "kelvin", "kgm", "gcm"];
    for (let i = 0; i < fields.length; i++) {
        let field = document.getElementById(fields[i]);
        if (field) field.value = "";
    }
    
    // Поля шкалы длины (создаются динамически)
    let meterInputs = document.querySelectorAll("#meter-scale input");
    for (let i = 0; i < meterInputs.length; i++) {
        meterInputs[i].value = "";
    }
}
    </script>

</body>
</html>
