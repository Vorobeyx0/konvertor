<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-57LQQWJ4FB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-57LQQWJ4FB');
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <meta charset="UTF-8">
    <title>Конвертор</title>
    <style>
        body {
            background: radial-gradient(circle, rgb(60, 73, 190), rgb(24, 34, 107));
            font-family: Arial, sans-serif;
            margin-left: 60px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 90% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 10%);
            pointer-events: none;
            animation: moveBg 12s infinite alternate;
            z-index: -1;
        }
        @keyframes moveBg {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(10%,5%) scale(1.3); opacity: 0.8; }
        }
        .card { animation: fadeSlideUp 0.5s ease forwards; opacity: 0; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }
        .card:nth-child(4) { animation-delay: 0.7s; }
        h1 {
            text-align: center;
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        h2 {
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input {
            text-align: center;
            border-radius: 10px;
            border: none;
            outline: none;
        }
        .row { margin: 20px 0; }
        label {
            color: white;
            font-size: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .container { margin: 20px 0; }
        .column {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            justify-content: center;
        }
        .emod {
            color: white;
            font-size: 65px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input:hover {
            transform: scale(1.02);
            transition: transform 0.2s ease;
        }
        .si-field {
            border: 3px solid gold;
            box-shadow: 0 0 6px gold;
            background: rgba(255, 255, 255, 0.95);
            font-weight: bold;
        }
        /* Стили для блока длины/давления */
        .meter-scale-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 50px;
        }
        .selector-label {
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }
        #quantitySelect {
            font-size: 22px;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            border: none;
            margin-bottom: 20px;
        }
        .units-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .unit-card {
            text-align: center;
            min-width: 100px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 16px;
        }
        .unit-card label {
            font-size: 20px;
            display: block;
            margin-bottom: 8px;
        }
        .unit-card input {
            width: 120px;
            height: 50px;
            font-size: 22px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Перевод физических величин</h1>
    <div style="text-align: center; margin: 20px 0;">
        <button onclick="clearAll()" style="background: #ff7e5e; color: white; font-size: 24px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;">
            🧹 Очистить все поля
        </button>
    </div>

    <div style="display: flex; gap: 25px; flex-wrap: wrap; justify-content: center;">
   
        <!-- Скорость -->
        <div class="column card">
            <div>
                <h2><span class="emod">🏃‍♂️➡️</span>Скорость</h2>
                <div class="row"><label>м/с</label><input id="ms" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>км/ч</label><input id="kmh" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>км/c</label><input id="kms" type="text" style="width:300px; height:60px; font-size:28px"></div>
                
            </div>
        </div>

        <!-- Время -->
        <div class="column card">
            <div>
                <h2><span class="emod">⏱️</span>Время</h2>
                <div class="container"><label>Сек </label><input id="sec" type="text" class="si-field" style="width:300px; height:60px; font-size:28px;"></div>
                <div class="container"><label>Мин</label><input id="min" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="container"><label>Час</label><input id="hour" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Температура -->
        <div class="column card">
            <div>
                <h2><span class="emod">🌡️</span>Температура</h2>
                <div class="row"><label>K</label><input id="kelvin" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°C</label><input id="celsius" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°F</label><input id="fahrenheit" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Плотность -->
        <div class="column card">
            <div>
                <h2><span class="emod">⚖️</span>Плотность</h2>
                <div class="row"><label>кг/м³</label><input id="kgm" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>г/см³</label><input id="gcm" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>т/м³</label><input id="tm" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>
    </div>
    
    <!-- Блок с выпадающим списком (Длина / Давление) -->
    <div class="meter-scale-container">
        <div style="text-align: center; margin-bottom: 20px;">
            <span class="selector-label">📏 Выберите величину:</span>
            <select id="quantitySelect">
                <option value="length">Длина (мкм ... Т)</option>
                <option value="pressure">Давление (Па ... )</option>
            </select>
        </div>
        <div id="unitsGrid" class="units-grid"></div>
    </div>

    <button onclick="clearAll()" style="background: #ff7e5e; color: white; font-size: 24px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;">
            
        Отзывы
        </button>
    

    <script>
        // === ДАННЫЕ ДЛЯ ДЛИНЫ (11 единиц) ===
        const lengthUnits = [
            { name: "микро (мкм)", factor: 1e-6 },
            { name: "милли (мм)", factor: 0.001 },
            { name: "санти (см)", factor: 0.01 },
            { name: "деци (дм)", factor: 0.1 },
            { name: "метр (м)", factor: 1 },
            { name: "дека (да)", factor: 10 },
            { name: "гекто (г)", factor: 100 },
            { name: "кило (к)", factor: 1000 },
            { name: "мега (М)", factor: 1e6 },
            { name: "гига (Г)", factor: 1e9 },
            { name: "тера (Т)", factor: 1e12 }
        ];

        // === ДАННЫЕ ДЛЯ ДАВЛЕНИЯ (11 единиц) ===
        const pressureUnits = [
            { name: "Паскаль (Па)", factor: 1 },
            { name: "Паскаль (Па)", factor: 1 },
            { name: "Паскаль (Па)", factor: 1 },
            { name: "Паскаль (Па)", factor: 1 },
            { name: "Паскаль (Па)", factor: 1 },
            { name: "Паскаль (Па)", factor: 1 },
           
        ];

        let currentUnits = lengthUnits; // по умолчанию Длина
        let currentInputs = []; // массив для хранения ссылок на input'ы

        // Функция отрисовки 11 полей
        function renderUnits(units) {
            const container = document.getElementById("unitsGrid");
            container.innerHTML = "";
            currentInputs = [];
            
            units.forEach((unit, index) => {
                const unitDiv = document.createElement("div");
                unitDiv.className = "unit-card";
                
                const label = document.createElement("label");
                label.textContent = unit.name;
                
                const input = document.createElement("input");
                input.type = "number";
                input.placeholder = "0";
                input.id = `unit_input_${index}`;
                
                // Подсветка базовой единицы (метр для длины, паскаль для давления)
                if ((currentUnits === lengthUnits && unit.name === "метр (м)") ||
                    (currentUnits === pressureUnits && unit.name === "Паскаль (Па)")) {
                    input.style.border = "3px solid gold";
                    input.style.boxShadow = "0 0 6px gold";
                    input.style.fontWeight = "bold";
                }
                
                input.addEventListener("input", (e) => updateAll(index, parseFloat(e.target.value)));
                
                unitDiv.appendChild(label);
                unitDiv.appendChild(input);
                container.appendChild(unitDiv);
                currentInputs.push({ input, factor: unit.factor, name: unit.name });
            });
        }
        
        // Обновление всех полей при изменении одного
        function updateAll(changedIndex, changedValue) {
            if (isNaN(changedValue)) return;
            
            const changedFactor = currentInputs[changedIndex].factor;
            const baseValue = changedValue * changedFactor;
            
            for (let i = 0; i < currentInputs.length; i++) {
                if (i !== changedIndex) {
                    const newValue = baseValue / currentInputs[i].factor;
                    currentInputs[i].input.value = parseFloat(newValue.toFixed(10));
                }
            }
        }
        
        // Очистка всех полей в динамическом блоке
        function clearDynamicFields() {
            for (let i = 0; i < currentInputs.length; i++) {
                currentInputs[i].input.value = "";
            }
        }
        
        // Переключение между длиной и давлением
        document.getElementById("quantitySelect").addEventListener("change", (e) => {
            if (e.target.value === "length") {
                currentUnits = lengthUnits;
            } else {
                currentUnits = pressureUnits;
            }
            renderUnits(currentUnits);
        });
        
        // === ОСНОВНЫЕ КОНВЕРТЕРЫ (Скорость, Время, Температура, Плотность) ===
        let a = document.getElementById("kmh");
        let b = document.getElementById("ms");
        let y = document.getElementById("kms");
        let c = document.getElementById("sec");
        let d = document.getElementById("hour");
        let e = document.getElementById("min");
        let z = document.getElementById("tm");
        let celsius = document.getElementById("celsius");
        let fahrenheit = document.getElementById("fahrenheit");
        let kelvin = document.getElementById("kelvin");
        let kgm = document.getElementById("kgm");
        let gcm = document.getElementById("gcm");

        function roundValue(val) {
            return parseFloat(Number(val).toFixed(6));
        }

        // Скорость
          let kmh = document.getElementById("kmh");
let ms = document.getElementById("ms");
let kms = document.getElementById("kms");

if (kmh && ms && kms) {
    kmh.oninput = () => {
        if (kmh.value) {
            ms.value = roundValue(kmh.value / 3.6);
            kms.value = roundValue(kmh.value / 3600);
        } else { ms.value = ""; kms.value = ""; }
    };
    ms.oninput = () => {
        if (ms.value) {
            kmh.value = roundValue(ms.value * 3.6);
            kms.value = roundValue(ms.value / 1000);
        } else { kmh.value = ""; kms.value = ""; }
    };
    kms.oninput = () => {
        if (kms.value) {
            kmh.value = roundValue(kms.value * 3600);
            ms.value = roundValue(kms.value * 1000);
        } else { kmh.value = ""; ms.value = ""; }
    };
}

        // Время
        if (c && d && e) {
            c.oninput = () => {
                if(c.value) {
                    d.value = roundValue(c.value / 3600);
                    e.value = roundValue(c.value / 60);
                } else { d.value = ""; e.value = ""; }
            };
            d.oninput = () => {
                if(d.value) {
                    c.value = roundValue(d.value * 3600);
                    e.value = roundValue(d.value * 60);
                } else { c.value = ""; e.value = ""; }
            };
            e.oninput = () => {
                if(e.value) {
                    c.value = roundValue(e.value * 60);
                    d.value = roundValue(e.value / 60);
                } else { c.value = ""; d.value = ""; }
            };
        }

        // Температура
        if (celsius && fahrenheit && kelvin) {
            celsius.oninput = () => {
                if(celsius.value) {
                    fahrenheit.value = roundValue((parseFloat(celsius.value) * 9/5 + 32));
                    kelvin.value = roundValue(parseFloat(celsius.value) + 273.15);
                } else { fahrenheit.value = ""; kelvin.value = ""; }
            };
            fahrenheit.oninput = () => {
                if(fahrenheit.value) {
                    celsius.value = roundValue((parseFloat(fahrenheit.value) - 32) * 5/9);
                    kelvin.value = roundValue((parseFloat(fahrenheit.value) - 32) * 5/9 + 273.15);
                } else { celsius.value = ""; kelvin.value = ""; }
            };
            kelvin.oninput = () => {
                if(kelvin.value) {
                    celsius.value = roundValue(parseFloat(kelvin.value) - 273.15);
                    fahrenheit.value = roundValue((parseFloat(kelvin.value) - 273.15) * 9/5 + 32);
                } else { celsius.value = ""; fahrenheit.value = ""; }
            };
        }

        // Плотность
       if (kgm && gcm && tm) {
    kgm.oninput = () => {
        if (kgm.value) {
            gcm.value = roundValue(kgm.value / 1000);
            tm.value = roundValue(kgm.value * 1000);
        } else { gcm.value = ""; tm.value = ""; }
    };
    gcm.oninput = () => {
        if (gcm.value) {
            kgm.value = roundValue(ms.value * 1000);
            tm.value = roundValue(ms.value * 100000);
        } else { kgm.value = ""; tm.value = ""; }
    };
    tm.oninput = () => {
        if (tm.value) {
            kgm.value = roundValue(tm.value * 1000);
            gcm.value = roundValue(tm.value / 1000);
        } else { kgm.value = ""; gcm.value = ""; }
    };
}
        

        // Глобальная очистка всех полей
        window.clearAll = function() {
            // Очистка верхних полей
            let fields = ["kmh", "ms", "sec", "min", "hour", "celsius", "fahrenheit", "kelvin", "kgm", "gcm"];
            for (let i = 0; i < fields.length; i++) {
                let field = document.getElementById(fields[i]);
                if (field) field.value = "";
            }
            // Очистка динамических полей (длина/давление)
            clearDynamicFields();
        };
        
        // Инициализация (показываем длину)
        renderUnits(lengthUnits);
    </script>
</body>
</html>
