<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Конвертер физических величин
    </title>
    <style>
        body {
            background: radial-gradient(circle, rgb(60, 73, 190), rgb(24, 34, 107));
            font-family: Arial, sans-serif;
            margin-left: 60px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 90% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 10%);
            pointer-events: none;
            animation: moveBg 12s infinite alternate;
            z-index: -1;
        }
        @keyframes moveBg {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(10%,5%) scale(1.3); opacity: 0.8; }
        }
        .card { animation: fadeSlideUp 0.5s ease forwards; opacity: 0; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }
        .card:nth-child(4) { animation-delay: 0.7s; }
        h1 {
            text-align: center;
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        h2 {
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input {
            text-align: center;
            border-radius: 10px;
            border: none;
            outline: none;
        }
        .row { margin: 20px 0; }
        label {
            color: white;
            font-size: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .container { margin: 20px 0; }
        .column {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            justify-content: center;
        }
        .emod {
            color: white;
            font-size: 65px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        input:hover {
            transform: scale(1.02);
            transition: transform 0.2s ease;
        }
        .si-field {
            border: 3px solid gold;
            box-shadow: 0 0 6px gold;
            background: rgba(255, 255, 255, 0.95);
            font-weight: bold;
        }
        .meter-scale-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 50px;
        }
        .selector-label {
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }
        #quantitySelect {
            font-size: 22px;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            border: none;
            margin-bottom: 20px;
        }
        .units-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .unit-card {
            text-align: center;
            min-width: 100px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 16px;
            
        }
        .unit-card label {
            font-size: 20px;
            display: block;
            margin-bottom: 8px;
        }
        .unit-card input {
            width: 120px;
            height: 50px;
            font-size: 22px;
            border-radius: 10px;
            text-align: center;
        }
        .exponent-hint {
    font-family: 'Segoe UI', 'Courier New', monospace;
    font-size: 13px;
    font-weight: 500;
}
    </style>
</head>
<body>

    <h1>Перевод физических величин</h1>
    <div style="text-align: center; margin: 20px 0;">
        <button onclick="clearAll()" style="background: #ff7e5e; color: white; font-size: 24px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;">
            🧹 Очистить все поля
        </button>
    </div>

    <div style="display: flex; gap: 25px; flex-wrap: wrap; justify-content: center;">
   
        <!-- Скорость -->
        <div class="column card">
            <div>
                <h2><span class="emod">🏃‍♂️➡️</span>Скорость</h2>
                <div class="row"><label>м/с</label><input id="ms" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>км/ч</label><input id="kmh" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>км/c</label><input id="kms" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Время -->
        <div class="column card">
            <div>
                <h2><span class="emod">⏱️</span>Время</h2>
                <div class="container"><label>Сек</label><input id="sec" type="text" class="si-field" style="width:300px; height:60px; font-size:28px;"></div>
                <div class="container"><label>Мин</label><input id="min" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="container"><label>Час</label><input id="hour" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Температура -->
        <div class="column card">
            <div>
                <h2><span class="emod">🌡️</span>Температура</h2>
                <div class="row"><label>K</label><input id="kelvin" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°C</label><input id="celsius" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>°F</label><input id="fahrenheit" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>

        <!-- Плотность -->
        <div class="column card">
            <div>
                <h2><span class="emod">⚖️</span>Плотность</h2>
                <div class="row"><label>кг/м³</label><input id="kgm" type="text" class="si-field" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>г/см³</label><input id="gcm" type="text" style="width:300px; height:60px; font-size:28px"></div>
                <div class="row"><label>т/м³</label><input id="tm" type="text" style="width:300px; height:60px; font-size:28px"></div>
            </div>
        </div>
    </div>
    
    <!-- Блок с выпадающим списком (Длина, Давление, Работа, Мощность) -->
    <div class="meter-scale-container">
        <div style="text-align: center; margin-bottom: 20px;">
            <span class="selector-label">📏 Выберите величину:</span>
            <select id="quantitySelect">
                <option value="length">Длина (L)</option>
                <option value="pressure">Давление (p)</option>
                <option value="job">Работа (A)</option>
                <option value="power">Мощность (N)</option>
            </select>
        </div>
        <div id="unitsGrid" class="units-grid"></div>
    </div>

    <button onclick="window.open('https://forms.gle/fwECLBTirWN52irK7')" style="background: #ff7e5e; color: white; font-size: 24px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;">
        📝 Отзывы
    </button>

    <script>
        // === ДАННЫЕ ДЛЯ ДЛИНЫ (11 единиц) ===
        const lengthUnits = [
            { name: "микро ", htmlExponent: "10⁻⁶ м", factor: 1e-6 },
            { name: "милли ", htmlExponent: "10⁻³ м", factor: 0.001 },
            { name: "санти ", htmlExponent: "10⁻² м", factor: 0.01 },
            { name: "деци ", htmlExponent: "10⁻¹ м", factor: 0.1 },
            { name: "метр ", htmlExponent: "м", factor: 1 },
            { name: "дека ", htmlExponent: "10¹ м", factor: 10 },
            { name: "гекто ", htmlExponent: "10² м", factor: 100 },
            { name: "кило ", htmlExponent: "10³ м", factor: 1000 },
            { name: "мега ", htmlExponent: "10⁶ м", factor: 1e6 },
            { name: "гига ", htmlExponent: "10⁹ м", factor: 1e9 },
            { name: "тера ", htmlExponent: "10¹² м", factor: 1e12 },
        ];

        // === ДАННЫЕ ДЛЯ ДАВЛЕНИЯ ===
        const pressureUnits = [
            
            { name: "микро ", htmlExponent: "10⁻⁶ Па", factor: 1e-6 },
            { name: "милли ", htmlExponent: "10⁻³ Па", factor: 0.001 },
            { name: "санти ", htmlExponent: "10⁻² Па", factor: 0.01 },
            { name: "деци ", htmlExponent: "10⁻¹ Па", factor: 0.1 },
            { name: "Паскаль ", htmlExponent: "Па", factor: 1 },
            { name: "дека ", htmlExponent: "10¹ Па", factor: 10 },
            { name: "гекто ", htmlExponent: "10² Па", factor: 100 },
            { name: "кило ", htmlExponent: "10³ Па", factor: 1000 },
            { name: "мега ", htmlExponent: "10⁶ Па", factor: 1e6 },
            { name: "гига ", htmlExponent: "10⁹ Па", factor: 1e9 },
            { name: "тера ", htmlExponent: "10¹² Па", factor: 1e12 },
            { name: "физическая атмосфера ", htmlExponent: "101325 Па", factor: 101325 },
        ];

        // === ДАННЫЕ ДЛЯ РАБОТЫ ===
        const jobUnits = [
            { name: "микро ", htmlExponent: "10⁻⁶ Дж", factor: 1e-6 },
            { name: "милли ", htmlExponent: "10⁻³ Дж", factor: 0.001 },
            { name: "санти ", htmlExponent: "10⁻² Дж", factor: 0.01 },
            { name: "деци ", htmlExponent: "10⁻¹ Дж", factor: 0.1 },
            { name: "Джоуль ", htmlExponent: "Дж", factor: 1 },
            { name: "дека ", htmlExponent: "10¹ Дж", factor: 10 },
            { name: "гекто ", htmlExponent: "10² Дж", factor: 100 },
            { name: "кило ", htmlExponent: "10³ Дж", factor: 1000 },
            { name: "мега ", htmlExponent: "10⁶ Дж", factor: 1e6 },
            { name: "гига ", htmlExponent: "10⁹ Дж", factor: 1e9 },
            { name: "тера ", htmlExponent: "10¹² Дж", factor: 1e12 },
        ];

        // === ДАННЫЕ ДЛЯ МОЩНОСТИ ===
        const powerUnits = [
            { name: "микро ", htmlExponent: "10⁻⁶ Вт", factor: 1e-6 },
            { name: "милли ", htmlExponent: "10⁻³ Вт", factor: 0.001 },
            { name: "санти ", htmlExponent: "10⁻² Вт", factor: 0.01 },
            { name: "деци ", htmlExponent: "10⁻¹ Вт", factor: 0.1 },
            { name: "Ватт ", htmlExponent: "Вт", factor: 1 },
            { name: "дека ", htmlExponent: "10¹ Вт", factor: 10 },
            { name: "гекто ", htmlExponent: "10² Вт", factor: 100 },
            { name: "кило ", htmlExponent: "10³ Вт", factor: 1000 },
            { name: "мега ", htmlExponent: "10⁶ Вт", factor: 1e6 },
            { name: "гига ", htmlExponent: "10⁹ Вт", factor: 1e9 },
            { name: "тера ", htmlExponent: "10¹² Вт", factor: 1e12 },
            { name: "лошадиная сила (л.с.)", htmlExponent: "≈ 735.5 Вт", factor: 735.5 },
        ];

        let currentUnits = lengthUnits;
        let currentInputs = [];

        // Функция отрисовки полей
        function renderUnits(units) {
            const container = document.getElementById("unitsGrid");
            container.innerHTML = "";
            currentInputs = [];

            units.forEach((unit, index) => {
                const unitDiv = document.createElement("div");
                unitDiv.className = "unit-card";

                const label = document.createElement("label");
                label.textContent = unit.name;

                const input = document.createElement("input");
                input.type = "number";
                input.placeholder = "0";
                input.id = `unit_input_${index}`;

                // Подсветка базовой единицы
                if ((currentUnits === lengthUnits && unit.name === "метр ") ||
                    (currentUnits === pressureUnits && unit.name === "паскаль ") ||
                    (currentUnits === jobUnits && unit.name === "джоуль ") ||
                    (currentUnits === powerUnits && unit.name === "ватт ")) {
                    input.style.border = "3px solid gold";
                    input.style.boxShadow = "0 0 6px gold";
                    input.style.fontWeight = "bold";
                }

                input.addEventListener("input", (e) => updateAll(index, parseFloat(e.target.value)));

                // Подсказка со степенью
                const exponentHint = document.createElement("div");
                exponentHint.innerHTML = unit.htmlExponent || "&nbsp;";
                exponentHint.style.fontSize = "26px";
                exponentHint.style.color = "#bbb";
                exponentHint.style.marginTop = "5px";
                exponentHint.style.color = "white";

                unitDiv.appendChild(label);
                unitDiv.appendChild(input);
                unitDiv.appendChild(exponentHint);
                container.appendChild(unitDiv);
                currentInputs.push({ input, factor: unit.factor, name: unit.name });
            });
        }

        function updateAll(changedIndex, changedValue) {
            if (isNaN(changedValue)) return;
            const sourceFactor = currentInputs[changedIndex].factor;
            const baseValue = changedValue * sourceFactor;
            for (let i = 0; i < currentInputs.length; i++) {
                if (i !== changedIndex) {
                    const newValue = baseValue / currentInputs[i].factor;
                    currentInputs[i].input.value = parseFloat(newValue.toFixed(10));
                }
            }
        }

        function clearDynamicFields() {
            for (let i = 0; i < currentInputs.length; i++) {
                currentInputs[i].input.value = "";
            }
        }

        // Переключение категории
        document.getElementById("quantitySelect").addEventListener("change", (e) => {
            switch (e.target.value) {
                case "length": currentUnits = lengthUnits; break;
                case "pressure": currentUnits = pressureUnits; break;
                case "job": currentUnits = jobUnits; break;
                case "power": currentUnits = powerUnits; break;
                default: currentUnits = lengthUnits;
            }
            renderUnits(currentUnits);
        });

        // === ОСНОВНЫЕ КОНВЕРТЕРЫ (Скорость, Время, Температура, Плотность) ===
        let kmh = document.getElementById("kmh");
        let ms = document.getElementById("ms");
        let kms = document.getElementById("kms");
        let sec = document.getElementById("sec");
        let min = document.getElementById("min");
        let hour = document.getElementById("hour");
        let celsius = document.getElementById("celsius");
        let fahrenheit = document.getElementById("fahrenheit");
        let kelvin = document.getElementById("kelvin");
        let kgm = document.getElementById("kgm");
        let gcm = document.getElementById("gcm");
        let tm = document.getElementById("tm");

        function roundValue(val) {
            return parseFloat(Number(val).toFixed(6));
        }

        // Скорость
        if (kmh && ms && kms) {
            kmh.oninput = () => { if (kmh.value) { ms.value = roundValue(kmh.value / 3.6); kms.value = roundValue(kmh.value / 3600); } else { ms.value = ""; kms.value = ""; } };
            ms.oninput = () => { if (ms.value) { kmh.value = roundValue(ms.value * 3.6); kms.value = roundValue(ms.value / 1000); } else { kmh.value = ""; kms.value = ""; } };
            kms.oninput = () => { if (kms.value) { kmh.value = roundValue(kms.value * 3600); ms.value = roundValue(kms.value * 1000); } else { kmh.value = ""; ms.value = ""; } };
        }

        // Время
        if (sec && min && hour) {
            sec.oninput = () => { if (sec.value) { hour.value = roundValue(sec.value / 3600); min.value = roundValue(sec.value / 60); } else { hour.value = ""; min.value = ""; } };
            hour.oninput = () => { if (hour.value) { sec.value = roundValue(hour.value * 3600); min.value = roundValue(hour.value * 60); } else { sec.value = ""; min.value = ""; } };
            min.oninput = () => { if (min.value) { sec.value = roundValue(min.value * 60); hour.value = roundValue(min.value / 60); } else { sec.value = ""; hour.value = ""; } };
        }

        // Температура
        
        // Температура — правильная версия (удаляет все старые обработчики)
if (celsius && fahrenheit && kelvin) {
    // Удаляем все старые обработчики
    celsius.oninput = null;
    fahrenheit.oninput = null;
    kelvin.oninput = null;
    
    // Ставим новые
    celsius.oninput = () => { 
        if (celsius.value !== "") { 
            fahrenheit.value = roundValue((parseFloat(celsius.value) * 9/5 + 32)); 
            kelvin.value = roundValue(parseFloat(celsius.value) + 273.15); 
        } else { 
            fahrenheit.value = ""; 
            kelvin.value = ""; 
        } 
    };
    
    fahrenheit.oninput = () => { 
        if (fahrenheit.value !== "") { 
            let c = (parseFloat(fahrenheit.value) - 32) * 5/9;
            celsius.value = roundValue(c); 
            kelvin.value = roundValue(c + 273.15); 
        } else { 
            celsius.value = ""; 
            kelvin.value = ""; 
        } 
    };
    
    kelvin.oninput = () => { 
        if (kelvin.value !== "") { 
            let c = parseFloat(kelvin.value) - 273.15;
            celsius.value = roundValue(c); 
            fahrenheit.value = roundValue(c * 9/5 + 32); 
        } else { 
            celsius.value = ""; 
            fahrenheit.value = ""; 
        } 
    };
}

        // Плотность
       // Плотность (исправлено)
if (kgm && gcm && tm) {
    kgm.oninput = () => { 
        if (kgm.value) { 
            let val = parseFloat(kgm.value);
            gcm.value = roundValue(val / 1000); 
            tm.value = roundValue(val / 1000);   // т/м³ = кг/м³ / 1000
        } else { gcm.value = ""; tm.value = ""; }
    };
    gcm.oninput = () => { 
        if (gcm.value) { 
            let val = parseFloat(gcm.value);
            kgm.value = roundValue(val * 1000); 
            tm.value = roundValue(val);           // т/м³ = г/см³ (то же число!)
        } else { kgm.value = ""; tm.value = ""; }
    };
    tm.oninput = () => { 
        if (tm.value) { 
            let val = parseFloat(tm.value);
            kgm.value = roundValue(val * 1000); 
            gcm.value = roundValue(val);          // г/см³ = т/м³ (то же число!)
        } else { kgm.value = ""; gcm.value = ""; }
    };
}


        // Глобальная очистка
        window.clearAll = function() {
            let fields = ["kmh", "ms", "kms", "sec", "min", "hour", "celsius", "fahrenheit", "kelvin", "kgm", "gcm", "tm"];
            for (let f of fields) {
                let el = document.getElementById(f);
                if (el) el.value = "";
            }
            clearDynamicFields();
        };

        // Инициализация
        renderUnits(lengthUnits);
    </script>
</body>
</html>
